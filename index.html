<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JhovNegocio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-50 text-slate-800 font-sans antialiased selection:bg-blue-500 selection:text-white">

    <header class="bg-white/80 backdrop-blur-md fixed w-full z-50 transition-all duration-300 border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent tracking-tight">
                JhovNegocio
            </h1>

            <nav class="hidden md:flex gap-8 font-semibold text-slate-600">
                <a href="#inicio" class="hover:text-blue-600 transition-colors relative after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 hover:after:w-full after:bg-blue-600 after:transition-all">Inicio</a>
                <a href="#servicios" class="hover:text-blue-600 transition-colors relative after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 hover:after:w-full after:bg-blue-600 after:transition-all">Servicios</a>
                <a href="#contacto" class="hover:text-blue-600 transition-colors relative after:absolute after:bottom-0 after:left-0 after:h-[2px] after:w-0 hover:after:w-full after:bg-blue-600 after:transition-all">Contacto</a>
            </nav>

            <div class="hidden md:flex items-center">
                <a href="#contacto" class="bg-slate-900 text-white font-medium px-5 py-2.5 rounded-xl hover:bg-blue-600 hover:shadow-lg hover:shadow-blue-500/20 active:scale-95 transition-all duration-200">
                    login
                </a>
            </div>

            <button id="menu-btn" class="md:hidden text-slate-700 focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-slate-100 px-6 py-4 space-y-3 absolute w-full left-0 shadow-lg">
            <a href="#inicio" class="block font-medium text-slate-600 hover:text-blue-600">Inicio</a>
            <a href="#servicios" class="block font-medium text-slate-600 hover:text-blue-600">Servicios</a>
           
            <a href="#contacto" class="block font-medium text-slate-600 hover:text-blue-600">Contacto</a>
            <a href="#contacto" class="block text-center bg-blue-600 text-white font-medium py-2 rounded-xl">empezar</a>
        </div>
    </header>

    <section id="inicio" class="relative min-h-screen flex items-center bg-slate-900 text-white overflow-hidden pt-16">
        <div class="absolute top-20 left-10 w-72 h-72 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
        <div class="absolute bottom-20 right-10 w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>

        <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center relative z-10 py-12">
            <div class="space-y-6 text-center md:text-left">
                <h2 class="text-4xl sm:text-5xl lg:text-6xl font-black leading-tight tracking-tight">
                    Haz crecer tu negocio con una página <span class="bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">moderna</span>
                </h2>
                <p class="text-lg text-slate-300 max-w-lg mx-auto md:mx-0">
                    Creamos soluciones digitales rápidas, atractivas y optimizadas en SEO para transformarte en el líder de tu sector.
                </p>
                <div class="flex flex-col sm:flex-row justify-center md:justify-start gap-4 pt-2">
                    <a href="#contacto" class="bg-blue-600 text-white px-8 py-3.5 rounded-xl font-bold hover:bg-blue-500 hover:shadow-lg hover:shadow-blue-500/30 active:scale-95 transition-all text-center">
                        ver servicios
                    </a>
                    <!-- <a href="#servicios" class="bg-slate-800 border border-slate-700 text-slate-200 px-8 py-3.5 rounded-xl font-bold hover:bg-slate-700 hover:text-white active:scale-95 transition-all text-center">
                        Ver Servicios
                    </a> -->
                </div>
            </div>

            <div class="flex justify-center relative group">
                <div class="absolute inset-0 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-3xl blur-2xl opacity-30 group-hover:opacity-40 transition-opacity duration-500"></div>
                <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1200&auto=format&fit=crop"
                    alt="Business" class="rounded-3xl shadow-2xl w-full max-w-lg relative z-10 transform group-hover:-translate-y-2 transition-transform duration-500 object-cover" />
            </div>
        </div>
    </section>

</body>

</html>
